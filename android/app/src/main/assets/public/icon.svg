<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Dark luxury charcoal-brown timber brand background gradient -->
    <linearGradient id="wood-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1c0f04" />
      <stop offset="40%" stop-color="#2a180a" />
      <stop offset="100%" stop-color="#0e0701" />
    </linearGradient>

    <!-- Warm orange brand accent gradient for active elements and glowing highlights -->
    <linearGradient id="orange-brand" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ff7a00" />
      <stop offset="100%" stop-color="#e65100" />
    </linearGradient>

    <!-- Glowing effect to mimic warm fire embers and luxury vibe -->
    <filter id="ember-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>

    <!-- Drop shadow for the central brand board -->
    <filter id="board-shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="16" stdDeviation="20" flood-color="#000000" flood-opacity="0.8" />
    </filter>
  </defs>

  <!-- Squircle app icon container with dark rich wood textured base -->
  <rect x="24" y="24" width="464" height="464" rx="104" fill="url(#wood-grad)" stroke="#ff7a00" stroke-width="2" stroke-opacity="0.25" />

  <!-- Background decorative aesthetic: Abstract warmth and sparks -->
  <!-- Glowing circle behind the center to symbolize the fireplace and heat strength -->
  <circle cx="256" cy="256" r="170" fill="#e65100" opacity="0.12" filter="url(#ember-glow)" />

  <!-- Abstract fiery ember dust particles (SVG decorative sparks) -->
  <circle cx="120" cy="140" r="3" fill="#ff9e40" opacity="0.6" filter="url(#ember-glow)" />
  <circle cx="410" cy="180" r="4" fill="#ff7a00" opacity="0.5" filter="url(#ember-glow)" />
  <circle cx="90" cy="320" r="5" fill="#ff5d00" opacity="0.4" filter="url(#ember-glow)" />
  <circle cx="380" cy="380" r="3" fill="#ffa726" opacity="0.7" />
  <circle cx="210" cy="420" r="4.5" fill="#ff7a00" opacity="0.5" filter="url(#ember-glow)" />
  <circle cx="310" cy="100" r="3.5" fill="#ff9e40" opacity="0.6" />

  <!-- Subtle brand background ring -->
  <circle cx="256" cy="256" r="190" fill="none" stroke="#ff7a00" stroke-width="1.5" stroke-opacity="0.15" stroke-dasharray="8 6" />

  <!-- Central elegant Plywood Panel representation -->
  <g filter="url(#board-shadow)">
    <!-- Simulated vertical plywood sheet card in center -->
    <rect x="96" y="96" width="320" height="320" rx="24" fill="#1b120c" stroke="#482e1d" stroke-width="3" />
    <!-- Golden organic texture line for premium woodworking craft -->
    <path d="M 120 96 L 120 416 M 392 96 L 392 416 M 150 96 C 160 180, 140 320, 160 416 M 340 96 C 310 160, 360 280, 330 416" fill="none" stroke="#ff7a00" stroke-width="1" stroke-opacity="0.08" />

    <!-- Brand Typography "VANMPLY" -->
    <g transform="translate(256, 230)">
      <!-- Slogan curved or straight above the main brand -->
      <text y="-55" font-family="'Inter', system-ui, sans-serif" font-weight="900" font-size="11" fill="#ffa726" letter-spacing="4" text-anchor="middle" opacity="0.9">TOUGH INSIDE • MAJESTIC OUTSIDE</text>

      <!-- Main "VANM" and badge "PLY" design -->
      <!-- We shift logo to align centrally -->
      <!-- Let's render as individual elements to style them perfectly -->
      <!-- "VANM" in bold luxurious white silver styling -->
      <text x="-52" y="15" font-family="'Inter', system-ui, sans-serif" font-weight="900" font-size="52" fill="#ffffff" letter-spacing="2" text-anchor="middle">VANM</text>
      
      <!-- "PLY" badge container -->
      <!-- Beautiful orange rectangular block -->
      <rect x="12" y="-28" width="112" height="54" rx="8" fill="url(#orange-brand)" />
      <!-- White high-impact "PLY" font inside badge -->
      <text x="68" y="14" font-family="'Inter', system-ui, sans-serif" font-weight="900" font-size="44" fill="#ffffff" letter-spacing="1" text-anchor="middle">PLY</text>
    </g>

    <!-- Sub title text under the letters -->
    <g transform="translate(256, 305)">
      <!-- Decorative dividing line -->
      <line x1="-80" y1="0" x2="80" y2="0" stroke="#ff7a00" stroke-width="2" stroke-opacity="0.5" />
      <!-- Slogan or brand subheader -->
      <text y="24" font-family="'Inter', system-ui, sans-serif" font-weight="800" font-size="12" fill="#e0e0e0" letter-spacing="3" text-anchor="middle">100% TERMITE PROOF</text>
      <text y="42" font-family="'Inter', system-ui, sans-serif" font-weight="600" font-size="9" fill="#ffa726" letter-spacing="2" text-anchor="middle">OFFICIAL EXCELLENCE CRM</text>
    </g>
  </g>

  <!-- Modern tech-forward overlay: Ring around the center -->
  <path d="M 256,40 A 216,216 0 0,1 472,256" fill="none" stroke="#ff7a00" stroke-width="4" stroke-linecap="round" stroke-opacity="0.4" stroke-dasharray="1 18" />
  <path d="M 256,472 A 216,216 0 0,1 40,256" fill="none" stroke="#ffffff" stroke-width="4" stroke-linecap="round" stroke-opacity="0.2" stroke-dasharray="1 18" />
</svg>

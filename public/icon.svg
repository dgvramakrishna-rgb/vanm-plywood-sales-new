<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Background Gradient: Deep premium indigo to violet-blue -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4f46e5" />
      <stop offset="100%" stop-color="#3730a3" />
    </linearGradient>
    <!-- Accent Gradient: Emerald green to teal for success & tracker metrics -->
    <linearGradient id="accent-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10b981" />
      <stop offset="100%" stop-color="#059669" />
    </linearGradient>
    <!-- Subtle drop shadow for depth -->
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#0f172a" flood-opacity="0.3" />
    </filter>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Smooth rounded base (Standard squircle app launcher shape) -->
  <rect x="32" y="32" width="448" height="448" rx="100" fill="url(#bg-grad)" />

  <!-- Inner ambient radial grid to enhance tech theme -->
  <circle cx="256" cy="256" r="180" fill="none" stroke="#6366f1" stroke-width="2" stroke-opacity="0.2" stroke-dasharray="10 10" />
  <circle cx="256" cy="256" r="120" fill="none" stroke="#6366f1" stroke-width="2" stroke-opacity="0.15" stroke-dasharray="5 5" />

  <!-- The Unified Tracker Icon: Check-In Map Pin & Checklist Hybrid -->
  <g filter="url(#shadow)">
    <!-- Map Pin Background Ring -->
    <circle cx="256" cy="220" r="85" fill="#ffffff" fill-opacity="0.08" stroke="#ffffff" stroke-width="3" stroke-opacity="0.2" />

    <!-- Sleek Map Pin -->
    <path d="M256 80 C180 80 140 135 140 210 C140 290 230 395 250 415 C253 418 259 418 262 415 C282 395 372 290 372 210 C372 135 332 80 256 80 Z" 
          fill="url(#accent-grad)" />

    <!-- inner white circle for map pin -->
    <circle cx="256" cy="205" r="45" fill="#ffffff" />

    <!-- Elegant Visit Checklist mark inside the inner circle -->
    <path d="M239 204 L251 216 L275 192" 
          fill="none" 
          stroke="url(#accent-grad)" 
          stroke-width="7" 
          stroke-linecap="round" 
          stroke-linejoin="round" />
  </g>

  <!-- Forward motion elements: Pulsing radar ring -->
  <path d="M 256,435 A 180,180 0 0,0 435,256" fill="none" stroke="#10b981" stroke-width="6" stroke-linecap="round" opacity="0.6" stroke-dasharray="1 15" />
</svg>
